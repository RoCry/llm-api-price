name: Update LLM Prices

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:  # Allow manual triggers
  push:
    branches:
      - master
    paths:
      - '.github/scripts/update_prices.py'
      - '.github/workflows/update-prices.yml'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'

concurrency:
  group: update-llm-prices
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8

      - name: Install dependencies
        run: uv sync --locked

      - name: Run tests
        run: uv run python -m unittest discover -s tests

  check-and-update:
    needs: test
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8

      - name: Install dependencies
        run: uv sync --locked

      - name: Check for updates and commit if needed
        run: uv run python .github/scripts/update_prices.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
